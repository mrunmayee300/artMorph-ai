name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artmorph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/artmorph_test?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AUTH_SECRET: ci-test-secret-minimum-32-characters-long
      OPENAI_API_KEY: sk-test
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_test
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      STRIPE_PRICE_CREATOR: price_test_creator
      STRIPE_PRICE_PRO: price_test_pro
      STRIPE_PRICE_TEAM: price_test_team
      SKIP_ENV_VALIDATION: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push
      - run: npm run lint
      - run: npm run test
      - run: npm run build
